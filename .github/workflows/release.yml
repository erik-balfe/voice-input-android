name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Build release APK
        run: ./gradlew :app:assembleRelease :app:testReleaseUnitTest --no-daemon

      - name: Package release APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          cp app/build/outputs/apk/release/app-release.apk "grok-voice-input-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: grok-voice-input-*.apk
          generate_release_notes: true
          body: |
            Install `grok-voice-input-*.apk` on your phone (enable install from unknown sources if needed).

            After install, open **Grok Voice Input** → set API key → enable under **Manage keyboards**.