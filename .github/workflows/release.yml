name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          body: |
            Install `app-debug.apk` on your phone (enable install from unknown sources if needed).

            After install, open **Grok Voice Input** → set API key → enable under **Manage keyboards**.